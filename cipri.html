<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Băute Ciprienești</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Băute">

    <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22B%C4%83ute%20Cipriene%C8%99ti%22%2C%22short_name%22%3A%22B%C4%83ute%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23121212%22%2C%22theme_color%22%3A%22%23121212%22%2C%22orientation%22%3A%22portrait%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%20100%20100%27%253E%253Crect%20width%3D%27100%27%20height%3D%27100%27%20fill%3D%27%2523FFD600%27%2F%253E%253Ctext%20y%3D%2775%27%20x%3D%2715%27%20font-size%3D%2760%27%253E%F0%9F%8D%BA%253C%2Ftext%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">

    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23FFD600'/%3E%3Ctext y='75' x='15' font-size='60'%3E🍺%3C/text%3E%3C/svg%3E">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' x='10' font-size='80'%3E🍺%3C/text%3E%3C/svg%3E">

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #eeeeee;
            --text-muted: #666666;
            --text-active: #ffffff;
            
            /* Yellow Theme */
            --accent: #FFD600; 
            --accent-hover: #ffea00;
            
            --total-color: #FFD600;
            --beer-color: #FFD600;
            --shot-color: #ff3d00;
            --danger: #ff4444;
            --success: #00E676;
            --border-radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 90px;
            padding-top: env(safe-area-inset-top);
        }

        /* Sticky Header */
        .app-header {
            position: sticky;
            top: 0;
            width: 100%;
            background-color: rgba(18, 18, 18, 0.98);
            z-index: 50;
            padding: 15px 20px;
            border-bottom: 1px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 600px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin: 0;
            font-weight: 800;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .icon-btn:active { background: var(--accent); color: black; }

        .prices-row {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }

        .price-group {
            flex: 1;
            display: flex;
            align-items: center;
            background: #252525;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #333;
        }

        .price-group label {
            font-size: 0.75rem;
            color: #aaa;
            margin-right: 8px;
            white-space: nowrap;
        }

        .price-group input {
            background: transparent;
            border: none;
            color: var(--text-main);
            width: 100%;
            font-weight: bold;
            font-size: 0.9rem;
            outline: none;
            text-align: right;
        }

        /* List Containers */
        #list-container, #history-container {
            width: 100%;
            max-width: 600px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Card */
        .person-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid #333;
            transition: border-color 0.3s;
        }
        
        .person-card.paid {
            border-color: var(--success);
            background-color: rgba(0, 230, 118, 0.05);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
            margin-bottom: 2px;
        }

        .person-name {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-main);
            max-width: 50%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .person-card.paid .person-name {
            color: var(--success);
            text-decoration: line-through;
            opacity: 0.8;
        }

        .person-total {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: var(--total-color);
            font-size: 1rem;
            text-shadow: 0 0 5px rgba(255, 214, 0, 0.2);
            margin-right: 10px;
        }

        .card-actions {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .counters-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .counter-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .label-group { display: flex; align-items: center; gap: 6px; }
        .control-group { display: flex; align-items: center; gap: 8px; }

        .count-val {
            font-size: 1rem;
            font-weight: bold;
            min-width: 20px;
            text-align: center;
            transition: color 0.2s;
        }

        .count-val.zero { color: var(--text-muted); }
        .count-val.active { color: var(--text-active); }

        .mini-btn {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: none;
            background-color: #333;
            color: white;
            font-size: 1.1rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .mini-btn:active { background-color: var(--accent); color: black; }
        
        /* Check & Delete Buttons */
        .check-btn, .delete-btn {
            background: transparent;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 5px;
            transition: 0.2s;
        }
        .check-btn { color: #555; }
        .check-btn.active { color: var(--success); text-shadow: 0 0 8px rgba(0, 230, 118, 0.5); }
        .delete-btn { color: #555; }
        .delete-btn:hover { color: var(--danger); }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 58px;
            height: 58px;
            background-color: var(--accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-size: 2rem;
            box-shadow: 0 4px 15px rgba(255, 214, 0, 0.3);
            cursor: pointer;
            border: none;
            z-index: 100;
            padding-bottom: 4px;
        }
        .fab:active { background-color: var(--accent-hover); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            padding-top: 10vh; 
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }

        .modal {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 14px;
            width: 90%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .modal h2 { font-size: 1.2rem; color: var(--text-main); margin-bottom: 0; }

        .search-wrapper { position: relative; }
        
        .modal input {
            width: 100%;
            padding: 12px;
            background-color: #2d2d2d;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .modal input:focus { border-color: var(--accent); }

        /* Autocomplete List */
        .autocomplete-list {
            margin-top: 5px;
            max-height: 150px;
            overflow-y: auto;
            background: #252525;
            border: 1px solid #444;
            border-radius: 8px;
            display: none;
        }
        .autocomplete-list.active { display: block; }
        
        .autocomplete-item {
            padding: 10px 12px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:active { background-color: #333; }
        .ac-name { font-weight: bold; }
        .ac-stats { font-size: 0.8rem; color: #888; }

        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 5px; }
        
        .btn { padding: 10px 18px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; font-size: 0.95rem; }
        .btn-cancel { background: transparent; color: #888; }
        .btn-confirm { background: var(--accent); color: #000; }

        .empty-state { text-align: center; color: #555; margin-top: 50px; font-style: italic; font-size: 0.9rem;}
        
        .icon-beer { color: var(--beer-color); font-size: 1.2rem; }
        .icon-shot { color: var(--shot-color); font-size: 1.2rem; }

        /* History View Specifics */
        .history-card {
            background-color: #222;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-stats {
            display: flex;
            gap: 15px;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div id="main-view">
        <div class="app-header">
            <div class="header-top">
                <h1>Băute Ciprienești</h1>
                <div class="header-actions">
                    <button class="icon-btn" onclick="toggleView('history')" title="Istoric">📜</button>
                    <button class="icon-btn" onclick="endNight()" title="Încheie Seara">🏁</button>
                </div>
            </div>
            <div class="prices-row">
                <div class="price-group">
                    <label>Preț Bere</label>
                    <input type="number" id="priceBeer" inputmode="decimal" step="0.5" oninput="updatePrices()">
                </div>
                <div class="price-group">
                    <label>Preț Shot</label>
                    <input type="number" id="priceShot" inputmode="decimal" step="0.5" oninput="updatePrices()">
                </div>
            </div>
        </div>

        <div id="list-container"></div>
        <div id="empty-msg" class="empty-state" style="display: none;">
            Nimeni nu bea încă...<br>Apasă + pentru a adăuga
        </div>

        <button class="fab" onclick="openModal()">+</button>
    </div>

    <div id="history-view" style="display: none;">
        <div class="app-header">
            <div class="header-top">
                <h1>Istoric Bețivi</h1>
                <div class="header-actions">
                    <button class="icon-btn" onclick="toggleView('main')">🔙</button>
                </div>
            </div>
        </div>
        <div id="history-container"></div>
        <div id="empty-history-msg" class="empty-state" style="display: none;">
            Nu există istoric momentan.<br>Apasă 🏁 pentru a încheia o seară.
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Cine bea?</h2>
            <div class="search-wrapper">
                <input type="text" id="nameInput" placeholder="Numele..." autocomplete="off" oninput="handleSearch()">
                <div id="autocompleteList" class="autocomplete-list"></div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Anulează</button>
                <button class="btn btn-confirm" onclick="addPerson()">Adaugă</button>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        const STORAGE_KEY = 'baute_ciprienesti_v7'; // Updated for history system
        
        let state = {
            prices: { beer: 14.5, shot: 7.5 },
            activeSession: [], // List for current night
            history: []        // All-time totals: {id, name, totalBeers, totalShots}
        };

        function init() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (parsed.prices) state.prices = parsed.prices;
                    if (parsed.activeSession) state.activeSession = parsed.activeSession;
                    if (parsed.history) state.history = parsed.history;
                } catch (e) { console.error("Data error", e); }
            }
            
            document.getElementById('priceBeer').value = state.prices.beer;
            document.getElementById('priceShot').value = state.prices.shot;
            renderMain();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        // --- Core Logic ---

        function updatePrices() {
            state.prices.beer = parseFloat(document.getElementById('priceBeer').value) || 0;
            state.prices.shot = parseFloat(document.getElementById('priceShot').value) || 0;
            saveData();
            renderMain();
        }

        // --- End of Night & History Logic ---
        
        function endNight() {
            if (state.activeSession.length === 0) {
                alert("Nu e nimeni în listă momentan.");
                return;
            }
            if (confirm("Ești sigur că vrei să închei seara? Datele vor fi salvate în istoric.")) {
                
                // Merge activeSession into history
                state.activeSession.forEach(person => {
                    // Find if user already exists in history
                    let historyUser = state.history.find(h => h.id === person.id);
                    
                    if (historyUser) {
                        historyUser.totalBeers += person.beers;
                        historyUser.totalShots += person.shots;
                        // Update name just in case they typed it differently
                        historyUser.name = person.name; 
                    } else {
                        // User not in history, create new entry
                        state.history.push({
                            id: person.id,
                            name: person.name,
                            totalBeers: person.beers,
                            totalShots: person.shots
                        });
                    }
                });

                // Clear active session
                state.activeSession = [];
                saveData();
                renderMain();
                alert("Seara s-a încheiat! Datele au fost salvate.");
            }
        }

        // --- Active Session Logic ---

        function addPerson(selectedId = null, selectedName = null) {
            const input = document.getElementById('nameInput');
            const name = selectedName || input.value.trim();
            if (!name) return;

            // Check if they already exist in the active session
            let existingInActive = state.activeSession.find(p => p.name.toLowerCase() === name.toLowerCase());
            if (existingInActive) {
                alert("Acest nume este deja în lista de azi.");
                closeModal();
                return;
            }

            // Determine ID: If picked from autocomplete, use that ID. Else generate new.
            let newId = selectedId;
            if (!newId) {
                // Try to find if typed name matches history exactly
                let matchInHistory = state.history.find(h => h.name.toLowerCase() === name.toLowerCase());
                newId = matchInHistory ? matchInHistory.id : Date.now();
            }

            const newPerson = {
                id: newId,
                name: name,
                beers: 0,
                shots: 0,
                paid: false
            };

            state.activeSession.push(newPerson);
            saveData();
            renderMain();
            closeModal();
            input.value = ''; 
        }

        function removePerson(id) {
            if(confirm('Ștergi pe acest bețiv? (Nu va fi salvat în istoric pentru azi)')) {
                state.activeSession = state.activeSession.filter(p => p.id !== id);
                saveData();
                renderMain();
            }
        }

        function updateCount(id, type, change) {
            const person = state.activeSession.find(p => p.id === id);
            if (!person) return;

            if (type === 'beers') {
                person.beers += change;
                if (person.beers < 0) person.beers = 0;
            } else if (type === 'shots') {
                person.shots += change;
                if (person.shots < 0) person.shots = 0;
            }

            saveData();
            renderMain();
        }

        function togglePaid(id) {
            const person = state.activeSession.find(p => p.id === id);
            if (person) {
                person.paid = !person.paid;
                saveData();
                renderMain();
            }
        }

        // --- Autocomplete Logic ---
        function handleSearch() {
            const val = document.getElementById('nameInput').value.toLowerCase();
            const list = document.getElementById('autocompleteList');
            list.innerHTML = '';
            
            // Get history users NOT currently in active session
            const activeIds = state.activeSession.map(p => p.id);
            let availableUsers = state.history.filter(h => !activeIds.includes(h.id));

            // Filter by search text (if any)
            if (val) {
                availableUsers = availableUsers.filter(h => h.name.toLowerCase().includes(val));
            }

            if (availableUsers.length > 0) {
                list.classList.add('active');
                availableUsers.forEach(user => {
                    const div = document.createElement('div');
                    div.className = 'autocomplete-item';
                    div.innerHTML = `
                        <span class="ac-name">${escapeHtml(user.name)}</span>
                        <span class="ac-stats">🍺 ${user.totalBeers} | 🥃 ${user.totalShots}</span>
                    `;
                    // When clicked, add them immediately
                    div.onclick = () => {
                        document.getElementById('nameInput').value = user.name;
                        addPerson(user.id, user.name);
                    };
                    list.appendChild(div);
                });
            } else {
                list.classList.remove('active');
            }
        }

        // --- Rendering Main View ---

        function renderMain() {
            const container = document.getElementById('list-container');
            const emptyMsg = document.getElementById('empty-msg');
            container.innerHTML = '';

            if (state.activeSession.length === 0) {
                emptyMsg.style.display = 'block';
                return;
            } else {
                emptyMsg.style.display = 'none';
            }

            state.activeSession.forEach(person => {
                const totalCost = (person.beers * state.prices.beer) + (person.shots * state.prices.shot);
                const formattedTotal = parseFloat(totalCost.toFixed(2));

                const card = document.createElement('div');
                card.className = `person-card ${person.paid ? 'paid' : ''}`;
                
                const beerClass = person.beers === 0 ? 'count-val zero' : 'count-val active';
                const shotClass = person.shots === 0 ? 'count-val zero' : 'count-val active';
                const checkClass = person.paid ? 'check-btn active' : 'check-btn';

                card.innerHTML = `
                    <div class="card-top">
                        <div class="person-name">${escapeHtml(person.name)}</div>
                        <div class="card-actions">
                            <div class="person-total">${formattedTotal} lei</div>
                            <button class="${checkClass}" onclick="togglePaid(${person.id})">✔</button>
                            <button class="delete-btn" onclick="removePerson(${person.id})">✖</button>
                        </div>
                    </div>
                    <div class="counters-grid">
                        <div class="counter-item">
                            <div class="label-group"><span class="icon-beer">🍺</span></div>
                            <div class="control-group">
                                <button class="mini-btn" onclick="updateCount(${person.id}, 'beers', -1)">-</button>
                                <span class="${beerClass}">${person.beers}</span>
                                <button class="mini-btn" onclick="updateCount(${person.id}, 'beers', 1)">+</button>
                            </div>
                        </div>
                        <div class="counter-item">
                            <div class="label-group"><span class="icon-shot">🥃</span></div>
                            <div class="control-group">
                                <button class="mini-btn" onclick="updateCount(${person.id}, 'shots', -1)">-</button>
                                <span class="${shotClass}">${person.shots}</span>
                                <button class="mini-btn" onclick="updateCount(${person.id}, 'shots', 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- Rendering History View ---
        function renderHistory() {
            const container = document.getElementById('history-container');
            const emptyMsg = document.getElementById('empty-history-msg');
            container.innerHTML = '';

            if (state.history.length === 0) {
                emptyMsg.style.display = 'block';
                return;
            } else {
                emptyMsg.style.display = 'none';
            }

            // Sort by most active drinker (beers + shots)
            let sortedHistory = [...state.history].sort((a,b) => (b.totalBeers + b.totalShots) - (a.totalBeers + a.totalShots));

            sortedHistory.forEach(user => {
                const card = document.createElement('div');
                card.className = 'history-card';
                card.innerHTML = `
                    <div class="person-name" style="max-width:40%;">${escapeHtml(user.name)}</div>
                    <div class="history-stats">
                        <span style="color:var(--beer-color)">🍺 ${user.totalBeers}</span>
                        <span style="color:var(--shot-color)">🥃 ${user.totalShots}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- Views & UI Helpers ---
        
        function toggleView(view) {
            if (view === 'history') {
                document.getElementById('main-view').style.display = 'none';
                document.getElementById('history-view').style.display = 'block';
                renderHistory();
            } else {
                document.getElementById('main-view').style.display = 'block';
                document.getElementById('history-view').style.display = 'none';
                renderMain();
            }
        }

        const modalOverlay = document.getElementById('modalOverlay');
        const nameInput = document.getElementById('nameInput');

        function openModal() {
            modalOverlay.classList.add('active');
            nameInput.value = '';
            handleSearch(); // Populate with history right away
            setTimeout(() => nameInput.focus(), 100);
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.getElementById('autocompleteList').classList.remove('active');
        }

        nameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addPerson();
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        init();
    </script>
</body>
</html>
